version: '3.8'

services:
  restaurante-web:
    image: ghcr.io/esteven2003/mi-restaurante-docker:latest
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        
        # Configuración HTTP (Redirección automática a HTTPS)
        - "traefik.http.routers.esteven-restaurante.entrypoints=http"
        - "traefik.http.routers.esteven-restaurante.rule=Host(`restaurante.byronrm.com`)"
        - "traefik.http.middlewares.restaurante-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.esteven-restaurante.middlewares=restaurante-https-redirect"
        
        # Configuración HTTPS Segura con TLS
        - "traefik.http.routers.esteven-restaurante-secure.entrypoints=https"
        - "traefik.http.routers.esteven-restaurante-secure.rule=Host(`restaurante.byronrm.com`)"
        - "traefik.http.routers.esteven-restaurante-secure.tls=true"
        - "traefik.http.routers.esteven-restaurante-secure.tls.certresolver=http"
        - "traefik.http.routers.esteven-restaurante-secure.service=esteven-restaurante"
        
        # Puerto interno de Nginx (Puerto 80)
        - "traefik.http.services.esteven-restaurante.loadbalancer.server.port=80"
        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true